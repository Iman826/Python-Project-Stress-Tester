<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Survey</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
    </div>

    <main class="survey-container">
        <div class="survey-card" id="survey-card">
            <!-- Start Screen -->
            <div id="start-screen" class="screen active">
                <div class="icon-header">
                    <i class="fa-solid fa-clipboard-list"></i>
                </div>
                <h1>We Value Your Opinion</h1>
                <p>Please take a moment to share your feedback with us. It will only take 2 minutes.</p>
                <button id="start-btn" class="btn-primary">Start Survey <i class="fa-solid fa-arrow-right"></i></button>
            </div>

            <!-- Question Screen -->
            <div id="question-screen" class="screen hidden">
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="question-header">
                    <span class="question-number" id="question-number">01</span>
                    <span class="question-total" id="question-total">/ 05</span>
                </div>
                <div class="question-content" id="question-content">
                    <!-- Question injected here -->
                </div>
                <div class="navigation-buttons">
                    <button id="prev-btn" class="btn-secondary hidden">Back</button>
                    <button id="next-btn" class="btn-primary" disabled>Next <i
                            class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <!-- Success Screen -->
            <div id="success-screen" class="screen hidden">
                <div class="icon-header success-icon">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h1>Thank You!</h1>
                <p>Your feedback has been successfully recorded. We appreciate your time.</p>
                <button id="restart-btn" class="btn-secondary">Submit Another Response</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
